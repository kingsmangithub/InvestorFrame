# Event taxonomy with subtypes, keyword rules, and economic thresholds

version: "1.0"

event_types:
  economic:
    subtypes:
      gdp_report:
        keywords: ["gdp", "gross domestic product", "economic growth"]
        threshold_pct: 0.5
      inflation_data:
        keywords: ["cpi", "inflation", "consumer price", "pce"]
        threshold_pct: 0.3
      jobs_report:
        keywords: ["jobs", "employment", "nonfarm payroll", "unemployment"]
        threshold_pct: 0.2
      consumer_confidence:
        keywords: ["consumer confidence", "consumer sentiment", "umich"]
        threshold_pct: 2.0
      retail_sales:
        keywords: ["retail sales", "consumer spending"]
        threshold_pct: 0.5
      housing_data:
        keywords: ["housing starts", "home sales", "mortgage"]
        threshold_pct: 1.0
      pmi:
        keywords: ["pmi", "purchasing managers", "ism manufacturing"]
        threshold_value: 50.0

  monetary_policy:
    subtypes:
      rate_decision:
        keywords: ["rate hike", "rate cut", "federal funds", "fomc", "interest rate"]
        severity_boost: 1
      fed_speech:
        keywords: ["fed chair", "powell", "fed governor", "fed speech", "hawkish", "dovish"]
      qe_qt:
        keywords: ["quantitative easing", "quantitative tightening", "balance sheet", "tapering"]

  geopolitical:
    subtypes:
      conflict:
        keywords: ["war", "military", "invasion", "missile", "troops"]
        default_severity: 4
      sanctions:
        keywords: ["sanctions", "embargo", "trade ban", "restriction"]
      election:
        keywords: ["election", "vote", "referendum", "inauguration"]
      trade_deal:
        keywords: ["trade deal", "trade agreement", "bilateral", "partnership"]

  earnings:
    subtypes:
      earnings_beat:
        keywords: ["beat expectations", "earnings beat", "exceeded estimates", "profit surge"]
        default_direction: bullish
      earnings_miss:
        keywords: ["missed expectations", "earnings miss", "below estimates", "profit decline"]
        default_direction: bearish
      guidance_change:
        keywords: ["guidance", "outlook", "forecast revision", "raised guidance", "lowered guidance"]

  regulatory:
    subtypes:
      new_regulation:
        keywords: ["regulation", "compliance", "new rules", "legislation"]
      deregulation:
        keywords: ["deregulation", "rollback", "loosening rules"]
      antitrust:
        keywords: ["antitrust", "monopoly", "competition law", "merger block"]

  commodity:
    subtypes:
      oil_supply:
        keywords: ["oil price", "opec", "crude oil", "oil supply", "barrel"]
      metal_demand:
        keywords: ["gold", "copper", "silver", "lithium", "rare earth"]
      agriculture:
        keywords: ["crop", "harvest", "grain", "food prices", "drought"]

  trade:
    subtypes:
      tariff_change:
        keywords: ["tariff", "import duty", "trade war", "customs"]
        severity_boost: 1
      trade_deficit:
        keywords: ["trade deficit", "trade surplus", "trade balance", "exports", "imports"]

  technology:
    subtypes:
      ai_development:
        keywords: ["artificial intelligence", "ai model", "machine learning", "generative ai"]
      cyber_incident:
        keywords: ["hack", "data breach", "cybersecurity", "ransomware"]
        default_severity: 3

  natural_disaster:
    subtypes:
      weather_event:
        keywords: ["hurricane", "earthquake", "flood", "wildfire", "tornado"]
        default_severity: 3
      pandemic:
        keywords: ["pandemic", "outbreak", "virus", "epidemic", "lockdown"]
        default_severity: 4

# Classification settings
classification:
  min_keyword_matches: 1
  case_sensitive: false
  fuzzy_threshold: 0.8
  default_severity: 3
  default_confidence: 0.6
