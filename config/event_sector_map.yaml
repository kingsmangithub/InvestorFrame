# Maps event types/subtypes to affected sectors with direction and weight
# direction: bullish | bearish | neutral (neutral inherits from event)
# weight: 0.0 to 1.0 (how strongly this event type affects this sector)
# decay_days: how long the effect persists

version: "1.0"

mappings:
  monetary_policy:
    rate_decision:
      - sector: XLF
        direction: bullish
        weight: 0.9
        decay_days: 14
      - sector: XLU
        direction: bearish
        weight: 0.7
        decay_days: 14
      - sector: XLRE
        direction: bearish
        weight: 0.8
        decay_days: 14
      - sector: XLK
        direction: bearish
        weight: 0.6
        decay_days: 10
      - sector: XLY
        direction: bearish
        weight: 0.5
        decay_days: 10

    fed_speech:
      - sector: XLF
        direction: neutral
        weight: 0.4
        decay_days: 5
      - sector: XLK
        direction: neutral
        weight: 0.3
        decay_days: 5

  economic:
    gdp_report:
      - sector: XLY
        direction: bullish
        weight: 0.7
        decay_days: 14
      - sector: XLI
        direction: bullish
        weight: 0.6
        decay_days: 14
      - sector: XLF
        direction: bullish
        weight: 0.5
        decay_days: 10

    inflation_data:
      - sector: XLP
        direction: bearish
        weight: 0.6
        decay_days: 10
      - sector: XLE
        direction: bullish
        weight: 0.5
        decay_days: 7
      - sector: XLF
        direction: bullish
        weight: 0.4
        decay_days: 7

    jobs_report:
      - sector: XLY
        direction: bullish
        weight: 0.6
        decay_days: 14
      - sector: XLI
        direction: bullish
        weight: 0.5
        decay_days: 10

    consumer_confidence:
      - sector: XLY
        direction: bullish
        weight: 0.7
        decay_days: 10
      - sector: XLP
        direction: bullish
        weight: 0.4
        decay_days: 7
      - sector: XLK
        direction: bullish
        weight: 0.3
        decay_days: 7

  geopolitical:
    conflict:
      - sector: XLE
        direction: bullish
        weight: 0.8
        decay_days: 14
      - sector: XLI
        direction: bullish
        weight: 0.6
        decay_days: 14
      - sector: XLK
        direction: bearish
        weight: 0.4
        decay_days: 7
      - sector: XLY
        direction: bearish
        weight: 0.5
        decay_days: 7

    sanctions:
      - sector: XLE
        direction: bullish
        weight: 0.6
        decay_days: 14
      - sector: XLB
        direction: bearish
        weight: 0.5
        decay_days: 10

  commodity:
    oil_supply:
      - sector: XLE
        direction: bullish
        weight: 0.9
        decay_days: 14
      - sector: XLI
        direction: bearish
        weight: 0.4
        decay_days: 7
      - sector: XLY
        direction: bearish
        weight: 0.3
        decay_days: 7

  technology:
    ai_development:
      - sector: XLK
        direction: bullish
        weight: 0.8
        decay_days: 14
      - sector: XLC
        direction: bullish
        weight: 0.5
        decay_days: 10

    cyber_incident:
      - sector: XLK
        direction: bearish
        weight: 0.5
        decay_days: 7

  regulatory:
    antitrust:
      - sector: XLK
        direction: bearish
        weight: 0.6
        decay_days: 14
      - sector: XLC
        direction: bearish
        weight: 0.5
        decay_days: 14

  trade:
    tariff_change:
      - sector: XLI
        direction: bearish
        weight: 0.7
        decay_days: 21
      - sector: XLK
        direction: bearish
        weight: 0.6
        decay_days: 14
      - sector: XLB
        direction: bearish
        weight: 0.5
        decay_days: 14

# Note: When mapping direction is "neutral", actual direction is inherited
# from the event. When "bullish"/"bearish", it is fixed. If event direction
# opposes mapping direction, the contribution sign is inverted.
