version: "1.0"

scenarios:
  fed_rate_hike_50bps:
    description: "Federal Reserve raises rates by 50 basis points"
    events:
      - event_type: monetary_policy
        subtype: rate_decision
        severity: 4
        direction: bearish
        headline: "Fed raises rates by 50bps in surprise move"
        confidence: 0.95

  fed_rate_cut_25bps:
    description: "Federal Reserve cuts rates by 25 basis points"
    events:
      - event_type: monetary_policy
        subtype: rate_decision
        severity: 3
        direction: bullish
        headline: "Fed cuts rates by 25bps, signals easing cycle"
        confidence: 0.9

  oil_price_shock:
    description: "Oil prices spike 20%+ due to supply disruption"
    events:
      - event_type: commodity
        subtype: oil_supply
        severity: 4
        direction: bullish
        headline: "Oil prices surge 20% on OPEC supply cuts"
        confidence: 0.85
      - event_type: economic
        subtype: inflation_data
        severity: 3
        direction: bearish
        headline: "Energy-driven inflation fears rise"
        confidence: 0.7

  tech_earnings_miss:
    description: "Major tech companies miss earnings expectations"
    events:
      - event_type: earnings
        subtype: earnings_miss
        severity: 4
        direction: bearish
        headline: "Multiple mega-cap tech firms report earnings misses"
        confidence: 0.9
      - event_type: earnings
        subtype: guidance_change
        severity: 3
        direction: bearish
        headline: "Tech sector guidance broadly lowered"
        confidence: 0.8

  geopolitical_escalation:
    description: "Major geopolitical conflict escalation"
    events:
      - event_type: geopolitical
        subtype: conflict
        severity: 5
        direction: bearish
        headline: "Military conflict escalates in key trade region"
        confidence: 0.8
      - event_type: geopolitical
        subtype: sanctions
        severity: 4
        direction: bearish
        headline: "Sweeping economic sanctions imposed"
        confidence: 0.85
    regime_override: risk_off

  tariff_war_escalation:
    description: "Broad tariff increases on major trading partners"
    events:
      - event_type: trade
        subtype: tariff_change
        severity: 4
        direction: bearish
        headline: "New tariffs imposed on broad range of imports"
        confidence: 0.9
      - event_type: economic
        subtype: consumer_confidence
        severity: 3
        direction: bearish
        headline: "Consumer confidence drops on trade uncertainty"
        confidence: 0.7

  recession_signal:
    description: "Multiple recession indicators triggered"
    events:
      - event_type: economic
        subtype: gdp_report
        severity: 5
        direction: bearish
        headline: "GDP contracts for second consecutive quarter"
        confidence: 0.95
      - event_type: economic
        subtype: jobs_report
        severity: 4
        direction: bearish
        headline: "Unemployment rises sharply"
        confidence: 0.9
      - event_type: economic
        subtype: consumer_confidence
        severity: 4
        direction: bearish
        headline: "Consumer sentiment hits multi-year low"
        confidence: 0.85
    regime_override: risk_off

  ai_breakthrough:
    description: "Major AI advancement with broad economic implications"
    events:
      - event_type: technology
        subtype: ai_development
        severity: 4
        direction: bullish
        headline: "Breakthrough AI capability announced with enterprise applications"
        confidence: 0.8
